name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Route Check
        run: npm run check:routes

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: E2E Route Smoke (required)
        run: npm run e2e:smoke -- --grep-invert "visual regression"

      - name: E2E Visual Regression (non-blocking)
        continue-on-error: true
        run: npm run e2e:smoke -- --grep "visual regression"
